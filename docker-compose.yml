services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/.env:/app/.env
    # Optionally mount data volumes if needed - e.g. for persistent sessions
    # volumes:
    #   - ./backend/sessions:/app/sessions

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_PROXY_TARGET=http://backend:8000
    depends_on:
      - backend
